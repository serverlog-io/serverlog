services:
  caddy:
    image: caddy:2-alpine
    container_name: serverlog-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./deploy/caddy/${CADDYFILE:-Caddyfile}:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - serverlog-network

  postgres:
    image: postgres:16-alpine
    container_name: serverlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-serverlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-serverlog}
      POSTGRES_DB: ${POSTGRES_DB:-serverlog}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serverlog}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - serverlog-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: serverlog-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3010
      - DATABASE_URL=postgresql://${POSTGRES_USER:-serverlog}:${POSTGRES_PASSWORD:-serverlog}@postgres:5432/${POSTGRES_DB:-serverlog}?schema=public
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - serverlog-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost}
    container_name: serverlog-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - serverlog-network

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  serverlog-network:
    driver: bridge
